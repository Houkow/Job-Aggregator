version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: jobaggregator-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    environment:
      - CHATBOT_URL=http://chatbot-api:5000
    build: ./backend
    container_name: backend-api
    restart: always
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
    command: npm run dev

  chatbot:
    image: python:3.9
    container_name: chatbot-api
    working_dir: /app
    restart: always
    ports:
      - "5001:5000"
    volumes:
      - ./main:/app
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
    command: >
      bash -c "
      pip install httpx==0.27.2 && 
      pip install fastapi uvicorn 'openai==1.51.0' psycopg2-binary python-dotenv &&
      export PYTHONPATH=/app &&
      uvicorn feature.chatbot.main:app --host 0.0.0.0 --port 5000 --reload
      "
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    image: node:20
    container_name: frontend-next
    working_dir: /app
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: >
      bash -c "
      npm install &&
      npm run dev
      "

volumes:
  postgres_data: